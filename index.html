<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cosmos_Global_Multi_2D - Chat Update</title>
    <link rel="icon" href="data:,">
    <style>
        body { text-align: center; background: #1a1a1a; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #eee; display: block; margin: 0 auto; border: 5px solid #444; }
        
        /* UIレイアウト */
        .info { background: rgba(0,0,0,0.9); padding: 10px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; border: 1px solid #0f0; }
        
        /* チャットボックス */
        #chat-box { position: fixed; bottom: 10px; left: 10px; width: 300px; height: 150px; background: rgba(0,0,0,0.7); color: white; text-align: left; padding: 10px; border-radius: 5px; font-size: 12px; display: flex; flex-direction: column; }
        #chat-log { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; border-bottom: 1px solid #444; }
        #chat-input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 5px; outline: none; }
        
        .controls { color: #ccc; font-size: 14px; margin-top: 10px; }
        .room-tag { background: #00bcd4; color: #000; padding: 2px 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="info">
        <div>SERVER: <span class="room-tag" id="room-display">Room 1</span></div>
        <div>MY ID: <span id="my-id">...</span></div>
        <div>CONNECTED: <span id="peer-count">0</span> / 10</div>
        <div id="status">Status: Online</div>
    </div>

    <h1 style="margin-top: 20px;">Cosmos Chat-Metaverse v1.2</h1>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log">Welcome to Cosmos!</div>
        <input type="text" id="chat-input" placeholder="メッセージを入力 (Enterで送信)" maxlength="30">
    </div>

    <div class="controls">
        WASD: Move | Space: Jump | Enter: Focus Chat<br>
        5月30日のセール終了まであと少し！みんなで話そうやｗ
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const chatLog = document.getElementById("chat-log");
        const chatInput = document.getElementById("chat-input");

        // --- 設定 ---
        const urlParams = new URLSearchParams(window.location.search);
        let roomNo = parseInt(urlParams.get('room')) || 1;
        document.getElementById('room-display').innerText = `Room ${roomNo}`;

        const gravity = 0.5;
        const player = { x: 100, y: 100, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false, msg: "" };
        const others = {}; 
        const connections = {}; 
        const keys = {};

        // --- PeerJS ---
        const peer = new Peer({ debug: 1 });

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        peer.on('connection', (conn) => setupConnection(conn));

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updatePeerCount();
                conn.send({ type: 'init', color: player.color });
            });

            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 0, y: 0, color: data.color, msg: "" };
                } else if (data.type === 'chat') {
                    // チャット受信
                    addChatLog(`${conn.peer.substring(0,5)}: ${data.msg}`);
                    if (others[conn.peer]) others[conn.peer].msg = data.msg;
                } else {
                    // 位置更新
                    if (others[conn.peer]) {
                        others[conn.peer].x = data.x;
                        others[conn.peer].y = data.y;
                    }
                }
            });

            conn.on('close', () => {
                delete others[conn.peer];
                delete connections[conn.peer];
                updatePeerCount();
            });
        }

        // --- チャット処理 ---
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                const msg = chatInput.value;
                addChatLog(`Me: ${msg}`);
                player.msg = msg; // 自分の頭上にも表示

                // 全員に送信
                Object.values(connections).forEach(conn => {
                    if (conn.open) conn.send({ type: 'chat', msg: msg });
                });

                chatInput.value = "";
                chatInput.blur(); // 入力後にフォーカス外す
            }
        });

        function addChatLog(text) {
            const div = document.createElement("div");
            div.innerText = text;
            chatLog.appendChild(div);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        function updatePeerCount() {
            const count = Object.keys(connections).length;
            document.getElementById('peer-count').innerText = count;
        }

        // --- ループ ---
        window.addEventListener("keydown", (e) => {
            if (document.activeElement !== chatInput) keys[e.code] = true;
            if (e.key === "Enter" && document.activeElement !== chatInput) chatInput.focus();
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) {
                player.dy = -12;
                player.isJumping = true;
            }

            player.dy += gravity;
            player.y += player.dy;

            if (player.y > canvas.height - player.h) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.isJumping = false;
            }

            // 同期
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ x: player.x, y: player.y });
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#444";
            ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            
            // 自分
            drawPlayer(player.x, player.y, player.color, player.msg, true);
            
            // 他人
            Object.values(others).forEach(p => {
                drawPlayer(p.x, p.y, p.color, p.msg, false);
            });
        }

        function drawPlayer(x, y, color, msg, isMe) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 30, 30);
            if (isMe) {
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(x, y, 30, 30);
            }
            // 頭上のチャット表示
            if (msg) {
                ctx.fillStyle = "white";
                ctx.font = "10px Arial";
                ctx.fillText(msg, x - 10, y - 10);
            }
        }

        update();
    </script>
</body>
</html>
