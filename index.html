<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cosmos_Global_Multi_2D - P2P Metaverse</title>
    <link rel="icon" href="data:,">
    <style>
        body { text-align: center; background: #1a1a1a; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #eee; display: block; margin: 0 auto; border: 5px solid #444; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .info { background: rgba(0,0,0,0.9); padding: 15px; position: fixed; top: 0; left: 0; text-align: left; font-size: 13px; z-index: 10; border-bottom-right-radius: 10px; border: 1px solid #0f0; }
        .server-status { color: #ffeb3b; font-weight: bold; margin-bottom: 5px; }
        .controls { color: #ccc; font-size: 14px; margin-top: 10px; }
        .connection-panel { margin-top: 15px; background: #333; padding: 10px; display: inline-block; border-radius: 5px; border: 1px solid #666; }
        input { padding: 8px; border: none; border-radius: 3px; width: 250px; }
        button { padding: 8px 15px; background: #0f0; color: #000; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; transform: scale(1.05); }
        .room-tag { background: #00bcd4; color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="info">
        <div class="server-status">SERVER: <span class="room-tag" id="room-display">Room 1</span></div>
        <div>MY ID: <span id="my-id" style="color: #fff;">Connecting...</span></div>
        <div>CONNECTED: <span id="peer-count" style="color: #ff4081; font-size: 18px;">0</span> / 10</div>
        <div id="status">Status: Initializing...</div>
    </div>

    <h1 style="margin-top: 20px;">Cosmos P2P Metaverse v1.1</h1>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="connection-panel">
        <input type="text" id="dest-id" placeholder="友達のIDをコピペしてな！">
        <button onclick="connectToPeer()">同じ部屋の友達と合流！</button>
    </div>

    <div class="controls">
        WASD/Arrows: Move | Space: Jump<br>
        10人超えたら自動で次の鯖に飛ばすで！ 5月30日のセール終了まで開発爆走中！
    </div>

    <script src="./peerjs.min.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- 1. サーバー（ルーム）管理ロジック ---
        const urlParams = new URLSearchParams(window.location.search);
        let roomNo = parseInt(urlParams.get('room')) || 1;
        document.getElementById('room-display').innerText = `Room ${roomNo}`;

        // --- 2. ゲーム設定 ---
        const gravity = 0.5;
        const player = { x: 100, y: 100, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false };
        const others = {}; 
        const connections = {}; 
        const keys = {};

        // --- 3. PeerJS 通信 ---
        const peer = new Peer({
            debug: 1,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = "Status: Online (鯖にログイン成功)";
        });

        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        function connectToPeer() {
            const destId = document.getElementById('dest-id').value;
            if (!destId) return alert("IDを入れてクレメンス！");
            if (Object.keys(connections).length >= 10) return alert("この部屋はもう満員や！");
            
            const conn = peer.connect(destId);
            setupConnection(conn);
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updatePeerCount();
                document.getElementById('status').innerText = "Status: プレイヤーが合流したで！";
                conn.send({ type: 'init', color: player.color });
            });

            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 0, y: 0, color: data.color };
                } else {
                    if (others[conn.peer]) {
                        others[conn.peer].x = data.x;
                        others[conn.peer].y = data.y;
                    }
                }
            });

            conn.on('close', () => {
                delete others[conn.peer];
                delete connections[conn.peer];
                updatePeerCount();
            });
        }

        function updatePeerCount() {
            const count = Object.keys(connections).length;
            document.getElementById('peer-count').innerText = count;

            // --- 4. 自動鯖移動ロジック ---
            if (count >= 10) {
                document.getElementById('status').innerText = "満員御礼！次の鯖へ転生するで...";
                setTimeout(() => {
                    const nextRoom = roomNo + 1;
                    window.location.href = `?room=${nextRoom}`;
                }, 2000);
            }
        }

        // --- 5. ゲームループ & 描画 ---
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) {
                player.dy = -12;
                player.isJumping = true;
            }

            player.dy += gravity;
            player.y += player.dy;

            // 画面外（下）判定
            if (player.y > canvas.height - player.h) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.isJumping = false;
            }

            // 全プレイヤーに位置を同期
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ x: player.x, y: player.y });
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 地面
            ctx.fillStyle = "#444";
            ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            
            // 自分
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            
            // 他人
            Object.values(others).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = 0.8;
                ctx.fillRect(p.x, p.y, 30, 30);
                ctx.globalAlpha = 1.0;
            });
        }

        update();
    </script>
</body>
</html>
