<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cosmos_Global_Multi_2D - Invite Link</title>
    <link rel="icon" href="data:,">
    <style>
        body { text-align: center; background: #1a1a1a; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #eee; display: block; margin: 0 auto; border: 5px solid #444; }
        .info { background: rgba(0,0,0,0.9); padding: 10px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; border: 1px solid #0f0; }
        .friend-panel { position: fixed; top: 10px; right: 10px; width: 180px; background: rgba(0,0,0,0.8); border: 1px solid #00bcd4; padding: 10px; font-size: 11px; color: #00bcd4; text-align: left; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #chat-box { position: fixed; bottom: 10px; left: 10px; width: 300px; height: 150px; background: rgba(0,0,0,0.7); color: white; text-align: left; padding: 10px; border-radius: 5px; font-size: 12px; display: flex; flex-direction: column; }
        #chat-log { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; }
        #chat-input { background: #222; border: 1px solid #0f0; color: #0f0; padding: 5px; outline: none; }
        input, button { padding: 8px; font-family: inherit; margin: 2px; }
        button { cursor: pointer; background: #0f0; border: none; font-weight: bold; }
        .room-tag { background: #ff4081; color: #fff; padding: 2px 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #0f0;">COSMOS METAVERSE</h1>
        <p>名前を入力してや</p>
        <input type="text" id="user-name-input" placeholder="Name..." maxlength="10">
        <button onclick="login()">ログイン</button>
    </div>

    <div class="info">
        <div>SERVER: <span class="room-tag" id="room-display">Room 1</span></div>
        <div>NAME: <span id="display-name" style="color: #fff;">...</span></div>
        <div style="cursor: pointer; color: yellow; border: 1px dashed yellow; padding: 5px; margin-top: 5px;" onclick="copyInviteUrl()">
            🔗 招待URLをコピー (SNS用)
        </div>
        <div style="font-size: 9px; margin-top: 5px; color: #888;">MY ID: <span id="my-id">...</span></div>
        <div>CONN: <span id="peer-count">0</span> / 10</div>
    </div>

    <div class="friend-panel">
        <div style="font-weight: bold; border-bottom: 1px solid #00bcd4; margin-bottom: 5px;">DIRECT JOIN</div>
        <input type="text" id="target-peer-id" placeholder="友達のIDをコピペ" style="width: 150px; font-size: 9px; padding: 4px;">
        <button onclick="manualConnect()" style="width: 160px; font-size: 10px; background: #00bcd4;">このIDの部屋へ合流！</button>
        <div style="margin-top: 10px; color: #aaa; font-size: 9px;">※招待URLを踏んで来た場合は自動で繋がるでｗ</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="Enterで送信" maxlength="30">
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        let myName = localStorage.getItem("cosmos_name") || "";
        const urlParams = new URLSearchParams(window.location.search);
        let roomNo = parseInt(urlParams.get('room')) || 1;
        let autoJoinId = urlParams.get('join'); // URLの ?join=... を取得

        const player = { x: 100, y: 100, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false, msg: "", name: myName };
        const others = {}; 
        const connections = {}; 
        const keys = {};

        window.onload = () => { if (myName) { document.getElementById("login-screen").style.display = "none"; startMetaverse(0); } };

        function login() {
            const input = document.getElementById("user-name-input").value;
            if (input) {
                myName = input; localStorage.setItem("cosmos_name", myName);
                player.name = myName; document.getElementById("login-screen").style.display = "none";
                startMetaverse(0);
            }
        }

        let peer = null;
        function startMetaverse(attemptIdx) {
            const fixedId = `cosmos-room-${roomNo}-${attemptIdx}`;
            peer = new Peer(fixedId);

            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById("display-name").innerText = myName;
                document.getElementById("room-display").innerText = `Room ${roomNo}`;
                
                // 通常の近隣接続
                autoConnect(attemptIdx);
                
                // 【新機能】招待URLから来た場合の自動接続
                if (autoJoinId && autoJoinId !== id) {
                    addChatLog(`[System] 招待URL: ${autoJoinId} に自動接続中...`);
                    setupConnection(peer.connect(autoJoinId));
                    autoJoinId = null; // 1回だけ実行
                }
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') { peer.destroy(); startMetaverse(attemptIdx + 1); }
                else if (err.type === 'peer-unavailable') { console.log("Peer offline"); }
            });

            peer.on('connection', (conn) => setupConnection(conn));
        }

        // 招待URLを生成してコピー
        function copyInviteUrl() {
            const myId = document.getElementById('my-id').innerText;
            if (myId === "...") return alert("まだIDが発行されてへんで！");
            const inviteUrl = `${window.location.origin}${window.location.pathname}?join=${myId}`;
            navigator.clipboard.writeText(inviteUrl).then(() => {
                alert("【招待URLコピー完了】\nこれを友達に送れば、この部屋に即合流できるでｗ\n" + inviteUrl);
            });
        }

        function manualConnect() {
            const targetId = document.getElementById('target-peer-id').value.trim();
            if (!targetId || targetId === peer.id) return;
            setupConnection(peer.connect(targetId));
            addChatLog(`[System] ${targetId} へ接続試行中...`);
        }

        function autoConnect(myIdx) {
            for (let i = 0; i < 10; i++) {
                if (i === myIdx) continue;
                setupConnection(peer.connect(`cosmos-room-${roomNo}-${i}`));
            }
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                if (connections[conn.peer]) return;
                connections[conn.peer] = conn;
                updatePeerCount();
                conn.send({ type: 'init', name: player.name, color: player.color });
            });

            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 0, y: 0, color: data.color, name: data.name, msg: "" };
                    addChatLog(`[System] ${data.name}と繋がったで！`);
                } else if (data.type === 'chat') {
                    addChatLog(`${others[conn.peer]?.name || '???'}: ${data.msg}`);
                    if (others[conn.peer]) others[conn.peer].msg = data.msg;
                } else {
                    if (others[conn.peer]) { others[conn.peer].x = data.x; others[conn.peer].y = data.y; }
                }
            });

            conn.on('close', () => {
                delete others[conn.peer]; delete connections[conn.peer];
                updatePeerCount();
            });
        }

        const chatInput = document.getElementById("chat-input");
        const chatLog = document.getElementById("chat-log");
        function addChatLog(t) {
            const d = document.createElement("div"); d.innerText = t;
            chatLog.appendChild(d); chatLog.scrollTop = chatLog.scrollHeight;
        }

        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                const msg = chatInput.value;
                addChatLog(`Me: ${msg}`); player.msg = msg;
                Object.values(connections).forEach(c => c.open && c.send({ type: 'chat', msg: msg }));
                chatInput.value = ""; chatInput.blur();
            }
        });

        window.addEventListener("keydown", (e) => {
            if (document.activeElement !== chatInput) keys[e.code] = true;
            if (e.key === "Enter" && document.activeElement !== chatInput) chatInput.focus();
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) { player.dy = -12; player.isJumping = true; }
            player.dy += 0.5; player.y += player.dy;
            if (player.y > canvas.height - 30) { player.y = canvas.height - 30; player.dy = 0; player.isJumping = false; }
            Object.values(connections).forEach(c => c.open && c.send({ x: player.x, y: player.y }));
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#444"; ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            drawP(player.x, player.y, player.color, player.name, player.msg, true);
            Object.values(others).forEach(p => drawP(p.x, p.y, p.color, p.name, p.msg, false));
            requestAnimationFrame(update);
        }

        function drawP(x, y, col, name, msg, isMe) {
            ctx.fillStyle = col; ctx.fillRect(x, y, 30, 30);
            if (isMe) { ctx.strokeStyle = "#fff"; ctx.strokeRect(x, y, 30, 30); }
            ctx.fillStyle = "white"; ctx.font = "10px Arial";
            ctx.fillText(name, x, y - 20);
            if (msg) { ctx.fillStyle = "#0f0"; ctx.fillText(msg, x, y - 5); }
        }

        function updatePeerCount() { document.getElementById('peer-count').innerText = Object.keys(connections).length; }
        update();
    </script>
</body>
</html>
