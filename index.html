<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shilox_Global_Multi_2D - Mobile Ready</title>
    <link rel="icon" href="data:,">
    <style>
        body { text-align: center; background: #0a0a0a; color: #00bcd4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; touch-action: none; }
        canvas { background: #111; display: block; margin: 0 auto; border: 5px solid #222; box-shadow: 0 0 20px rgba(0, 188, 212, 0.3); cursor: crosshair; max-width: 100%; height: auto; }
        .info { background: rgba(0,0,0,0.9); padding: 8px; position: fixed; top: 0; left: 0; text-align: left; font-size: 10px; z-index: 10; border: 1px solid #00bcd4; border-radius: 0 0 8px 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #chat-box { position: fixed; bottom: 80px; left: 10px; width: 200px; height: 100px; background: rgba(0,0,0,0.8); color: white; text-align: left; padding: 5px; border-radius: 5px; font-size: 10px; border: 1px solid #00bcd4; display: flex; flex-direction: column; pointer-events: none; }
        #chat-log { flex-grow: 1; overflow-y: auto; }
        #chat-input { background: #111; border: 1px solid #00bcd4; color: #fff; padding: 5px; outline: none; pointer-events: auto; }
        input, button { padding: 8px; font-family: inherit; margin: 2px; border-radius: 4px; }
        button { cursor: pointer; background: #00bcd4; border: none; font-weight: bold; color: #000; }

        /* 📱 スマホ用コントローラー */
        .mobile-controls { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; pointer-events: none; }
        .joy-btn { width: 60px; height: 60px; background: rgba(0, 188, 212, 0.3); border: 2px solid #00bcd4; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #fff; font-weight: bold; pointer-events: auto; user-select: none; -webkit-user-select: none; }
        .joy-btn:active { background: rgba(255, 255, 255, 0.5); }
        .left-controls { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #00bcd4; letter-spacing: 3px;">SHILOX METAVERSE</h1>
        <input type="text" id="user-name-input" placeholder="Name..." maxlength="10">
        <button onclick="login()">ENTER</button>
    </div>

    <div class="info">
        <div>USER: <span id="display-name" style="color: #fff;">...</span></div>
        <div onclick="copyInviteUrl()" style="color:#ffeb3b; cursor:pointer;">🔗 URL COPY</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="Chat..." maxlength="30">
    </div>

    <div class="mobile-controls">
        <div class="left-controls">
            <div class="joy-btn" id="btn-left">◀</div>
            <div class="joy-btn" id="btn-right">▶</div>
        </div>
        <div class="joy-btn" id="btn-up">▲</div>
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const GRID_SIZE = 40;
        const WORLD_WIDTH = 3200;
        const WORLD_HEIGHT = 1200;
        const camera = { x: 0, y: 0 };

        let myName = localStorage.getItem("shilox_name") || "";
        const player = { x: 400, y: WORLD_HEIGHT - 100, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false, msg: "", name: myName };
        const others = {}; 
        const connections = {}; 
        const keys = {};
        let blocks = {};
        let peer;

        function login() {
            const input = document.getElementById("user-name-input").value;
            if (input) {
                myName = input;
                localStorage.setItem("shilox_name", myName);
                player.name = myName; 
                document.getElementById("login-screen").style.display = "none";
                startShiloxMetaverse(0);
            }
        }

        function startShiloxMetaverse(attemptIdx) {
            peer = new Peer(`shilox-room-1-${attemptIdx}`);
            peer.on('open', id => {
                document.getElementById("display-name").innerText = myName;
                for (let i = 0; i < 10; i++) { if (i !== attemptIdx) setupConnection(peer.connect(`shilox-room-1-${i}`)); }
            });
            peer.on('connection', conn => setupConnection(conn));
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                conn.send({ type: 'init', name: player.name, color: player.color, blocks: blocks });
            });
            conn.on('data', data => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 400, y: 300, color: data.color, name: data.name, msg: "" };
                    Object.assign(blocks, data.blocks);
                } else if (data.type === 'chat') {
                    addChatLog(`${others[conn.peer]?.name || '???'}: ${data.msg}`);
                    if (others[conn.peer]) others[conn.peer].msg = data.msg;
                } else if (data.type === 'block') {
                    if (data.action === 'add') blocks[data.pos] = data.color;
                    else delete blocks[data.pos];
                } else {
                    if (others[conn.peer]) { others[conn.peer].x = data.x; others[conn.peer].y = data.y; }
                }
            });
        }

        function broadcast(data) { Object.values(connections).forEach(c => c.open && c.send(data)); }

        // --- 🧱 タッチ/マウスでのブロック配置 ---
        const handleAction = (clientX, clientY, isAdd) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (clientX - rect.left) * scaleX + camera.x;
            const mouseY = (clientY - rect.top) * scaleY + camera.y;
            const gridX = Math.floor(mouseX / GRID_SIZE) * GRID_SIZE;
            const gridY = Math.floor(mouseY / GRID_SIZE) * GRID_SIZE;
            const pos = `${gridX},${gridY}`;

            if (isAdd) {
                blocks[pos] = "#444";
                broadcast({ type: 'block', action: 'add', pos: pos, color: "#444" });
            } else {
                delete blocks[pos];
                broadcast({ type: 'block', action: 'remove', pos: pos });
            }
        };

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) handleAction(e.touches[0].clientX, e.touches[0].clientY, true);
        });

        canvas.addEventListener('mousedown', (e) => {
            handleAction(e.clientX, e.clientY, e.button === 0 && !e.shiftKey);
        });

        // --- 🏃 スマホ操作用イベント ---
        const touchKeys = { left: false, right: false, up: false };
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); touchKeys[key] = true; });
            el.addEventListener('touchend', (e) => { e.preventDefault(); touchKeys[key] = false; });
            // PCでの動作確認用
            el.addEventListener('mousedown', () => touchKeys[key] = true);
            el.addEventListener('mouseup', () => touchKeys[key] = false);
        };
        setupBtn('btn-left', 'left'); setupBtn('btn-right', 'right'); setupBtn('btn-up', 'up');

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"] || touchKeys.left) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"] || touchKeys.right) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"] || touchKeys.up) && !player.isJumping) { player.dy = -10; player.isJumping = true; }
            
            player.dy += 0.5; player.y += player.dy;
            if (player.y > WORLD_HEIGHT - 40) { player.y = WORLD_HEIGHT - 40; player.dy = 0; player.isJumping = false; }
            
            Object.keys(blocks).forEach(pos => {
                const [bx, by] = pos.split(',').map(Number);
                if (player.x + 25 > bx && player.x + 5 < bx + GRID_SIZE && player.y + 30 > by && player.y + 30 < by + 15 && player.dy >= 0) {
                    player.y = by - 30; player.dy = 0; player.isJumping = false;
                }
            });

            camera.x = player.x - canvas.width / 2; camera.y = player.y - canvas.height / 2;
            camera.x = Math.max(0, Math.min(camera.x, WORLD_WIDTH - canvas.width));
            camera.y = Math.max(0, Math.min(camera.y, WORLD_HEIGHT - canvas.height));

            broadcast({ x: player.x, y: player.y });
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-camera.x, -camera.y);
            ctx.fillStyle = "#222"; ctx.fillRect(0, WORLD_HEIGHT - 10, WORLD_WIDTH, 10);
            Object.keys(blocks).forEach(pos => {
                const [bx, by] = pos.split(',').map(Number);
                ctx.fillStyle = blocks[pos]; ctx.fillRect(bx, by, GRID_SIZE - 2, GRID_SIZE - 2);
            });
            drawChar(player.x, player.y, player.color, player.name, player.msg, true);
            Object.values(others).forEach(p => drawChar(p.x, p.y, p.color, p.name, p.msg, false));
            ctx.restore();
        }

        function drawChar(x, y, col, name, msg, isMe) {
            ctx.fillStyle = col; ctx.fillRect(x, y, 30, 30);
            ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText(name, x + 15, y - 10);
            if (msg) { ctx.fillStyle = "#0f0"; ctx.fillText(msg, x + 15, y - 25); }
        }

        const chatInput = document.getElementById("chat-input");
        const chatLog = document.getElementById("chat-log");
        function addChatLog(t) { const d = document.createElement("div"); d.innerText = t; chatLog.appendChild(d); chatLog.scrollTop = chatLog.scrollHeight; }
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                addChatLog(`Me: ${chatInput.value}`); player.msg = chatInput.value;
                broadcast({ type: 'chat', msg: chatInput.value });
                chatInput.value = ""; chatInput.blur();
            }
        });
        window.addEventListener("keydown", (e) => { if (document.activeElement !== chatInput) keys[e.code] = true; });
        window.addEventListener("keyup", (e) => keys[e.code] = false);
        window.onload = () => { if (myName) { document.getElementById("login-screen").style.display = "none"; startShiloxMetaverse(0); } };
        function copyInviteUrl() { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?join=${peer.id}`).then(() => alert("URL COPY!")); }

        update();
    </script>
</body>
</html>
