<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cosmos_Global_Multi_2D</title>
    <link rel="icon" href="data:,"> <style>
        body { text-align: center; background: #1a1a1a; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #eee; display: block; margin: 0 auto; border: 5px solid #444; }
        .info { background: rgba(0,0,0,0.8); padding: 10px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; }
        .controls { color: #ccc; font-size: 14px; margin-top: 5px; }
        .connection-panel { margin-top: 15px; background: #333; padding: 10px; display: inline-block; border-radius: 5px; }
        input { padding: 5px; border: none; border-radius: 3px; }
        button { padding: 5px 15px; background: #0f0; color: #000; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
    </style>
</head>
<body>
    <div class="info">
        <div>MY ID: <span id="my-id" style="color: #fff; font-weight: bold;">Connecting...</span></div>
        <div>CONNECTED: <span id="peer-count">0</span></div>
        <div id="status">Status: Initializing...</div>
    </div>

    <h1>Cosmos P2P Metaverse v1.0</h1>
    
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="connection-panel">
        <input type="text" id="dest-id" placeholder="相手のIDをコピペしてな！">
        <button onclick="connectToPeer()">相手に接続！</button>
    </div>

    <div class="controls">
        WASD/Arrows: Move | Space: Jump<br>
        自分のIDを友達に教えるか、相手のIDを入れて「接続」を押してや！
    </div>

    <script src="./peerjs.min.js"></script>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // --- 1. ゲーム設定 ---
        const gravity = 0.5;
        const player = { x: 100, y: 100, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false };
        const others = {}; 
        const connections = {}; 
        const keys = {};

        // --- 2. PeerJS 設定 ---
        const peer = new Peer({
            debug: 1,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status').innerText = "Status: Online (Waiting for connection)";
            console.log("MY ID: " + id);
        });

        // 誰かが繋いできた時
        peer.on('connection', (conn) => {
            setupConnection(conn);
        });

        // 自分から繋ぎにいく時の関数
        function connectToPeer() {
            const destId = document.getElementById('dest-id').value;
            if (!destId) return alert("IDを入れてクレメンス！");
            
            const conn = peer.connect(destId);
            setupConnection(conn);
            document.getElementById('status').innerText = `Connecting to: ${destId}...`;
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                updatePeerCount();
                document.getElementById('status').innerText = "Status: Connected!";
                conn.send({ type: 'init', color: player.color });
            });

            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 0, y: 0, color: data.color };
                } else {
                    if (others[conn.peer]) {
                        others[conn.peer].x = data.x;
                        others[conn.peer].y = data.y;
                    }
                }
            });

            conn.on('close', () => {
                delete others[conn.peer];
                delete connections[conn.peer];
                updatePeerCount();
                document.getElementById('status').innerText = "Status: Disconnected";
            });
        }

        function updatePeerCount() {
            document.getElementById('peer-count').innerText = Object.keys(connections).length;
        }

        // --- 3. ループ & 物理 ---
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) {
                player.dy = -12;
                player.isJumping = true;
            }

            player.dy += gravity;
            player.y += player.dy;

            if (player.y > canvas.height - player.h) {
                player.y = canvas.height - player.h;
                player.dy = 0;
                player.isJumping = false;
            }

            // 位置同期
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send({ x: player.x, y: player.y });
            });

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#444";
            ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            
            // 自分
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.strokeStyle = "#fff";
            ctx.strokeRect(player.x, player.y, player.w, player.h);
            
            // 他人
            Object.values(others).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 30, 30);
            });
        }

        update();
    </script>
</body>
</html>
