<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shilox_Global_Multi_2D - High Security</title>
    <link rel="icon" href="data:,">
    <style>
        body { text-align: center; background: #0a0a0a; color: #00bcd4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #111; display: block; margin: 0 auto; border: 5px solid #222; box-shadow: 0 0 20px rgba(0, 188, 212, 0.3); cursor: crosshair; }
        .info { background: rgba(0,0,0,0.9); padding: 12px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; border: 1px solid #00bcd4; border-radius: 0 0 8px 0; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #chat-box { position: fixed; bottom: 10px; left: 10px; width: 300px; height: 150px; background: rgba(0,0,0,0.8); color: white; text-align: left; padding: 10px; border-radius: 5px; font-size: 12px; border: 1px solid #00bcd4; display: flex; flex-direction: column; }
        #chat-log { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; }
        #chat-input { background: #111; border: 1px solid #00bcd4; color: #fff; padding: 5px; outline: none; }
        input, button { padding: 8px; font-family: inherit; margin: 2px; border-radius: 4px; }
        button { cursor: pointer; background: #00bcd4; border: none; font-weight: bold; color: #000; }
        .warning-text { color: #ff4081; font-size: 10px; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #00bcd4; letter-spacing: 3px;">SHILOX METAVERSE</h1>
        <p>名前を入力してください</p>
        <div class="warning-text">※個人情報や不適切な言葉は禁止です</div>
        <input type="text" id="user-name-input" placeholder="Your Name..." maxlength="10">
        <button onclick="login()">ENTER WORLD</button>
    </div>

    <div class="info">
        <div>SERVER: <span style="background:#ff4081; color:#fff; padding:2px 5px;">Room 1</span></div>
        <div>USER: <span id="display-name" style="color: #fff;">...</span></div>
        <div onclick="copyInviteUrl()" style="margin-top:8px; border:1px dashed #ffeb3b; padding:8px; cursor:pointer; color:#ffeb3b;">🔗 招待URLをコピー</div>
        <div style="font-size: 10px; color: #aaa; margin-top:5px;">
            [建築] 左クリック:配置 / 右クリック:削除
        </div>
        <div class="warning-text">⚠️ 住所や連絡先の交換は絶対禁止！</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="不適切な発言は制限されます" maxlength="30">
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        // --- 🛡️ 強化版NGワードリスト（誘拐・性犯罪・個人情報漏洩の防止） ---
        const NG_WORDS = [
            "死ね", "殺す", "バカ", "うんこ", "ゴミ", "カス", "ks", "gm",
            "住所", "じゅうしょ", "どこ住み", "どこに住んでる", "家に来て", "会おう", "あおう",
            "連絡先", "LINE", "ライン", "カカオ", "電話", "番号", "メルアド", "メール",
            "出会い", "sex", "セックス", "fuck", "セフレ", "エッチ", "h",
            "年齢", "何歳", "ねんれい", "学生", "小学生", "中学生", "高校生",
            "場所", "ばしょ", "どこにいる", "どこいる", "公園", "駅", "コンビニ",
            "誘拐", "攫う", "連れ去る", "http", "https", ".com", ".jp"
        ];
        
        function filterText(text) {
            let f = text;
            NG_WORDS.forEach(w => {
                const reg = new RegExp(w, "gi"); // 大文字小文字問わず
                f = f.replace(reg, "❌".repeat(w.length));
            });
            return f;
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const GRID_SIZE = 40;

        let myName = localStorage.getItem("shilox_name") || "";
        const player = { x: 400, y: 300, w: 30, h: 30, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false, msg: "", name: myName };
        const others = {}; 
        const connections = {}; 
        const keys = {};
        let blocks = {};

        window.onload = () => { if (myName) { document.getElementById("login-screen").style.display = "none"; startShiloxMetaverse(0); } };

        function login() {
            const input = document.getElementById("user-name-input").value.trim();
            if (input) {
                const safeName = filterText(input);
                if (safeName.includes("❌")) { alert("不適切な名前は使えません。"); return; }
                myName = safeName;
                localStorage.setItem("shilox_name", myName);
                player.name = myName; 
                document.getElementById("login-screen").style.display = "none";
                startShiloxMetaverse(0);
            }
        }

        function startShiloxMetaverse(attemptIdx) {
            peer = new Peer(`shilox-room-1-${attemptIdx}`);
            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById("display-name").innerText = myName;
                for (let i = 0; i < 10; i++) { if (i !== attemptIdx) setupConnection(peer.connect(`shilox-room-1-${i}`)); }
            });
            peer.on('error', (err) => { if (err.type === 'unavailable-id') { peer.destroy(); startShiloxMetaverse(attemptIdx + 1); } });
            peer.on('connection', (conn) => setupConnection(conn));
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                connections[conn.peer] = conn;
                conn.send({ type: 'init', name: player.name, color: player.color, blocks: blocks });
            });
            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 400, y: 300, color: data.color, name: filterText(data.name), msg: "" };
                    addChatLog(`[System] ${others[conn.peer].name}が入室しました。`);
                    Object.assign(blocks, data.blocks);
                } else if (data.type === 'chat') {
                    const m = filterText(data.msg);
                    addChatLog(`${others[conn.peer]?.name || 'Unknown'}: ${m}`);
                    if (others[conn.peer]) others[conn.peer].msg = m;
                } else if (data.type === 'block') {
                    if (data.action === 'add') blocks[data.pos] = data.color;
                    else delete blocks[data.pos];
                } else {
                    if (others[conn.peer]) { others[conn.peer].x = data.x; others[conn.peer].y = data.y; }
                }
            });
            conn.on('close', () => { delete others[conn.peer]; delete connections[conn.peer]; });
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const gridX = Math.floor((e.clientX - rect.left) / GRID_SIZE) * GRID_SIZE;
            const gridY = Math.floor((e.clientY - rect.top) / GRID_SIZE) * GRID_SIZE;
            const pos = `${gridX},${gridY}`;
            if (e.button === 0 && !e.shiftKey) { blocks[pos] = "#444"; broadcast({ type: 'block', action: 'add', pos: pos, color: "#444" }); }
            else { delete blocks[pos]; broadcast({ type: 'block', action: 'remove', pos: pos }); }
        });
        canvas.oncontextmenu = (e) => e.preventDefault();

        function broadcast(data) { Object.values(connections).forEach(c => c.open && c.send(data)); }

        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) { player.dy = -10; player.isJumping = true; }
            player.dy += 0.5; player.y += player.dy;
            if (player.y > canvas.height - 40) { player.y = canvas.height - 40; player.dy = 0; player.isJumping = false; }
            
            Object.keys(blocks).forEach(pos => {
                const [bx, by] = pos.split(',').map(Number);
                if (player.x + 25 > bx && player.x + 5 < bx + GRID_SIZE && player.y + 30 > by && player.y + 30 < by + 15 && player.dy >= 0) {
                    player.y = by - 30; player.dy = 0; player.isJumping = false;
                }
            });

            broadcast({ x: player.x, y: player.y });
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#222"; ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            Object.keys(blocks).forEach(pos => {
                const [bx, by] = pos.split(',').map(Number);
                ctx.fillStyle = "#444"; ctx.fillRect(bx, by, GRID_SIZE - 2, GRID_SIZE - 2);
            });
            drawChar(player.x, player.y, player.color, player.name, player.msg, true);
            Object.values(others).forEach(p => drawChar(p.x, p.y, p.color, p.name, p.msg, false));
        }

        function drawChar(x, y, col, name, msg, isMe) {
            ctx.fillStyle = col; ctx.fillRect(x, y, 30, 30);
            ctx.fillStyle = "white"; ctx.font = "bold 10px Arial"; ctx.textAlign = "center";
            ctx.fillText(name, x + 15, y - 10);
            if (msg) { ctx.fillStyle = "#0f0"; ctx.fillText(msg, x + 15, y - 25); }
        }

        const chatInput = document.getElementById("chat-input");
        const chatLog = document.getElementById("chat-log");
        function addChatLog(t) { const d = document.createElement("div"); d.innerText = t; chatLog.appendChild(d); chatLog.scrollTop = chatLog.scrollHeight; }
        
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                const m = filterText(chatInput.value);
                addChatLog(`Me: ${m}`); player.msg = m;
                broadcast({ type: 'chat', msg: m });
                chatInput.value = ""; chatInput.blur();
            }
        });
        window.addEventListener("keydown", (e) => { if (document.activeElement !== chatInput) keys[e.code] = true; });
        window.addEventListener("keyup", (e) => keys[e.code] = false);
        function copyInviteUrl() { navigator.clipboard.writeText(`${window.location.origin}${window.location.pathname}?join=${peer.id}`).then(() => alert("招待URLをコピーしました。安全に使用してください。")); }

        update();
    </script>
</body>
</html>
