<!DOCTYPE html><!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shilox_Global_Multi_2D - Iron Dome</title>
    <style>
        body { text-align: center; background: #050505; color: #00bcd4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #111; display: block; margin: 0 auto; border: 5px solid #222; box-shadow: 0 0 30px rgba(0, 188, 212, 0.5); cursor: crosshair; }
        .info { background: rgba(0,0,0,0.95); padding: 15px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; border: 2px solid #ff4081; border-radius: 0 0 12px 0; }
        #chat-box { position: fixed; bottom: 10px; left: 10px; width: 320px; height: 180px; background: rgba(0,0,0,0.9); border: 2px solid #00bcd4; display: flex; flex-direction: column; border-radius: 8px; }
        #chat-log { flex-grow: 1; overflow-y: auto; padding: 5px; font-size: 11px; color: #eee; }
        #chat-input { background: #000; border: none; border-top: 1px solid #00bcd4; color: #fff; padding: 8px; outline: none; }
        .warning-msg { color: #ff4081; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="info">
        <div style="font-weight: bold; color: #ff4081; margin-bottom: 5px;">⚠️ SECURITY LEVEL: MAX</div>
        <div>USER: <span id="display-name" style="color: #fff;">...</span></div>
        <div class="warning-msg">個人情報・外部SNS誘導は即刻規制</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="安全な言葉を選んでください" maxlength="30">
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        // --- 🛡️ 超強化フィルタリングエンジン ---
        const NG_WORDS = ["死ね", "殺す", "バカ", "住所", "会お", "LINE", "ライン", "番号", "歳", "性", "エッチ", "場所", "http", "www", ".com", ".jp", ".net", "じゅうしょ", "あお", "らいん", "でんわ"];
        
        let lastSpeechTime = 0; // クールタイム管理

        function getSafeText(text) {
            // 1. スペースや記号を抜いて判定（「L I N E」対策）
            let normalized = text.replace(/[\s　.,/_ー-]/g, "");
            
            let isSafe = true;
            NG_WORDS.forEach(word => {
                if (normalized.includes(word) || text.includes(word)) {
                    isSafe = false;
                }
            });

            if (!isSafe) {
                return "【不適切な表現が含まれていたため検閲されました】";
            }
            return text;
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const GRID_SIZE = 40;
        let myName = localStorage.getItem("shilox_name") || "Guest" + Math.floor(Math.random()*1000);
        
        // プレイヤー初期設定
        const player = { x: 400, y: 300, color: `hsl(${Math.random()*360}, 70%, 50%)`, dy: 0, isJumping: false, msg: "", name: myName };
        const others = {}; 
        const connections = {}; 
        const keys = {};
        let blocks = {};

        // ピア接続（ルーム管理は前と同じ）
        const peer = new Peer(`shilox-max-sec-${Math.floor(Math.random()*10)}`);
        peer.on('open', (id) => {
            document.getElementById("display-name").innerText = myName;
            addChatLog("[System] 防衛システム起動。安全な会話を心がけてください。");
        });
        peer.on('connection', (conn) => setupConnection(conn));

        function setupConnection(conn) {
            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    // 受信側でもう一度検閲（万が一、送信側が改造されてても防ぐ）
                    const safeMsg = getSafeText(data.msg);
                    addChatLog(`${data.name || '??? '}: ${safeMsg}`);
                    if (others[conn.peer]) others[conn.peer].msg = safeMsg;
                } else if (data.type === 'move') {
                    if (!others[conn.peer]) others[conn.peer] = { name: data.name, color: data.color };
                    others[conn.peer].x = data.x; others[conn.peer].y = data.y;
                }
            });
        }

        // --- 📨 送信処理の強化 ---
        const chatInput = document.getElementById("chat-input");
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                const now = Date.now();
                // 3秒のクールタイム（連投禁止）
                if (now - lastSpeechTime < 3000) {
                    addChatLog("[System] 連投制限中や！ちょっと落ち着けｗ");
                    return;
                }

                const rawMsg = chatInput.value;
                const safeMsg = getSafeText(rawMsg);
                
                addChatLog(`Me: ${safeMsg}`);
                player.msg = safeMsg;
                lastSpeechTime = now;

                Object.values(connections).forEach(c => {
                    if (c.open) c.send({ type: 'chat', msg: safeMsg, name: myName });
                });
                
                chatInput.value = "";
                chatInput.blur();
            }
        });

        // 描画・更新ループ（基本部分はニキのコードを継承）
        function update() {
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) { player.dy = -10; player.isJumping = true; }
            player.dy += 0.5; player.y += player.dy;
            if (player.y > canvas.height - 40) { player.y = canvas.height - 40; player.dy = 0; player.isJumping = false; }
            
            Object.values(connections).forEach(c => {
                if (c.open) c.send({ type: 'move', x: player.x, y: player.y, name: myName, color: player.color });
            });

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = player.color; ctx.fillRect(player.x, player.y, 30, 30);
            ctx.fillStyle = "#fff"; ctx.fillText(player.name, player.x + 15, player.y - 5);
            if (player.msg) ctx.fillText(player.msg, player.x + 15, player.y - 20);

            Object.values(others).forEach(p => {
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, 30, 30);
                ctx.fillStyle = "#fff"; ctx.fillText(p.name, p.x + 15, p.y - 5);
                if (p.msg) ctx.fillText(p.msg, p.x + 15, p.y - 20);
            });
            requestAnimationFrame(update);
        }

        function addChatLog(t) {
            const d = document.createElement("div");
            d.innerText = t;
            const log = document.getElementById("chat-log");
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
        }

        window.addEventListener("keydown", (e) => { if (document.activeElement !== chatInput) keys[e.code] = true; });
        window.addEventListener("keyup", (e) => keys[e.code] = false);
        update();
    </script>
</body>
</html>
