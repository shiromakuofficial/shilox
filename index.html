<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Shilox_Global_Multi_2D</title>
    <link rel="icon" href="data:,">
    <style>
        /* 基本デザインの設定：Shiloxカラー（シアンと黒）を基調にしています */
        body { text-align: center; background: #0a0a0a; color: #00bcd4; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        canvas { background: #111; display: block; margin: 0 auto; border: 5px solid #222; box-shadow: 0 0 20px rgba(0, 188, 212, 0.3); }
        
        /* 情報パネル：左上に固定 */
        .info { background: rgba(0,0,0,0.9); padding: 12px; position: fixed; top: 0; left: 0; text-align: left; font-size: 12px; z-index: 10; border: 1px solid #00bcd4; border-radius: 0 0 8px 0; }
        
        /* ログイン画面：中央に表示 */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* チャットボックス：左下に固定 */
        #chat-box { position: fixed; bottom: 10px; left: 10px; width: 300px; height: 150px; background: rgba(0,0,0,0.8); color: white; text-align: left; padding: 10px; border-radius: 5px; font-size: 12px; border: 1px solid #00bcd4; display: flex; flex-direction: column; }
        #chat-log { flex-grow: 1; overflow-y: auto; margin-bottom: 5px; }
        #chat-input { background: #111; border: 1px solid #00bcd4; color: #fff; padding: 5px; outline: none; }
        
        /* 共通ボタン・入力欄 */
        input, button { padding: 8px; font-family: inherit; margin: 2px; border-radius: 4px; }
        button { cursor: pointer; background: #00bcd4; border: none; font-weight: bold; color: #000; }
        button:hover { background: #fff; }
        
        .room-tag { background: #ff4081; color: #fff; padding: 2px 5px; border-radius: 3px; }
        .invite-area { margin-top: 8px; border: 1px dashed #ffeb3b; padding: 8px; cursor: pointer; color: #ffeb3b; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #00bcd4; letter-spacing: 3px;">SHILOX METAVERSE</h1>
        <p>名前を入力して接続してください</p>
        <input type="text" id="user-name-input" placeholder="Your Name..." maxlength="10">
        <button onclick="login()">ENTER WORLD</button>
    </div>

    <div class="info">
        <div>SERVER: <span class="room-tag" id="room-display">Room 1</span></div>
        <div>USER: <span id="display-name" style="color: #fff;">...</span></div>
        <div class="invite-area" onclick="copyInviteUrl()">
            🔗 招待URLをコピーする
        </div>
        <div style="font-size: 9px; margin-top: 5px; color: #555;">SHILOX ID: <span id="my-id">Initializing...</span></div>
        <div>ONLINE: <span id="peer-count">0</span> / 10</div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="chat-box">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" placeholder="メッセージを入力してEnter" maxlength="30">
    </div>

    <script src="./peerjs.min.js"></script>
    <script>
        /**
         * Shilox Metaverse クライアントサイド・スクリプト
         */
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // ユーザー情報の初期設定（ストレージ名をshiloxに変更）
        let myName = localStorage.getItem("shilox_name") || "";
        const urlParams = new URLSearchParams(window.location.search);
        let roomNo = parseInt(urlParams.get('room')) || 1;
        let autoJoinId = urlParams.get('join'); 

        // プレイヤーオブジェクトの定義
        const player = { 
            x: 400, y: 370, w: 30, h: 30, 
            color: `hsl(${Math.random()*360}, 70%, 50%)`, 
            dy: 0, isJumping: false, msg: "", name: myName 
        };
        const others = {}; 
        const connections = {}; 
        const keys = {};

        // ページロード時の自動ログイン処理
        window.onload = () => { 
            if (myName) { 
                document.getElementById("login-screen").style.display = "none"; 
                startShiloxMetaverse(0); 
            } 
        };

        /**
         * ログイン処理：ユーザー名を保存し世界を開始します
         */
        function login() {
            const input = document.getElementById("user-name-input").value;
            if (input) {
                myName = input; 
                localStorage.setItem("shilox_name", myName);
                player.name = myName; 
                document.getElementById("login-screen").style.display = "none";
                startShiloxMetaverse(0);
            }
        }

        let peer = null;
        /**
         * Shiloxネットワークの開始：独自のIDでPeerJSサーバに接続します
         */
        function startShiloxMetaverse(attemptIdx) {
            // ID体系を shilox-room に統一
            const fixedId = `shilox-room-${roomNo}-${attemptIdx}`;
            peer = new Peer(fixedId);

            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById("display-name").innerText = myName;
                document.getElementById("room-display").innerText = `Room ${roomNo}`;
                
                // 同じルーム内の他ユーザーへ自動接続を試みます
                autoConnect(attemptIdx);
                
                // 招待URL経由でアクセスした場合の処理
                if (autoJoinId && autoJoinId !== id) {
                    addChatLog(`[System] 招待ID: ${autoJoinId} に接続しています...`);
                    setupConnection(peer.connect(autoJoinId));
                    autoJoinId = null; 
                }
            });

            peer.on('error', (err) => {
                // IDが既に使用されている場合は、次の番号で再試行します
                if (err.type === 'unavailable-id') { 
                    peer.destroy(); 
                    startShiloxMetaverse(attemptIdx + 1); 
                }
                else if (err.type === 'peer-unavailable') {
                    console.log("対象のピアは現在オフラインです");
                }
            });

            // 外部からの接続要求を待機します
            peer.on('connection', (conn) => setupConnection(conn));
        }

        /**
         * 招待URLの生成とコピー
         */
        function copyInviteUrl() {
            const myId = document.getElementById('my-id').innerText;
            if (myId === "Initializing...") return;
            const inviteUrl = `${window.location.origin}${window.location.pathname}?join=${myId}`;
            navigator.clipboard.writeText(inviteUrl).then(() => {
                alert("Shilox 招待URLをコピーしました！\nこのURLを友達に共有して合流しましょう。");
            });
        }

        /**
         * 同一ルーム内の他プレイヤーへ一斉に接続を試みます
         */
        function autoConnect(myIdx) {
            for (let i = 0; i < 10; i++) {
                if (i === myIdx) continue;
                setupConnection(peer.connect(`shilox-room-${roomNo}-${i}`));
            }
        }

        /**
         * 接続のセットアップ：データ送受信のルールを定義します
         */
        function setupConnection(conn) {
            conn.on('open', () => {
                if (connections[conn.peer]) return;
                connections[conn.peer] = conn;
                updatePeerCount();
                // 接続直後に自分の情報を送信
                conn.send({ type: 'init', name: player.name, color: player.color });
            });

            conn.on('data', (data) => {
                if (data.type === 'init') {
                    others[conn.peer] = { x: 400, y: 370, color: data.color, name: data.name, msg: "" };
                    addChatLog(`[System] ${data.name}がログインしました。`);
                } else if (data.type === 'chat') {
                    addChatLog(`${others[conn.peer]?.name || 'Unknown'}: ${data.msg}`);
                    if (others[conn.peer]) others[conn.peer].msg = data.msg;
                } else {
                    // 位置情報の更新
                    if (others[conn.peer]) { 
                        others[conn.peer].x = data.x; 
                        others[conn.peer].y = data.y; 
                    }
                }
            });

            conn.on('close', () => {
                delete others[conn.peer]; 
                delete connections[conn.peer];
                updatePeerCount();
            });
        }

        // チャットUI制御
        const chatInput = document.getElementById("chat-input");
        const chatLog = document.getElementById("chat-log");
        function addChatLog(text) {
            const div = document.createElement("div"); 
            div.innerText = text;
            chatLog.appendChild(div); 
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        // 入力制御：Enterキーでの送信
        chatInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && chatInput.value !== "") {
                const msg = chatInput.value;
                addChatLog(`Me: ${msg}`); 
                player.msg = msg;
                // 全接続先へメッセージを送信
                Object.values(connections).forEach(c => c.open && c.send({ type: 'chat', msg: msg }));
                chatInput.value = ""; 
                chatInput.blur();
            }
        });

        // キーボード入力の状態を管理
        window.addEventListener("keydown", (e) => {
            if (document.activeElement !== chatInput) keys[e.code] = true;
            if (e.key === "Enter" && document.activeElement !== chatInput) chatInput.focus();
        });
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        /**
         * メインループ：プレイヤーの移動計算と描画を毎フレーム行います
         */
        function update() {
            // 移動処理
            if (keys["ArrowLeft"] || keys["KeyA"]) player.x -= 5;
            if (keys["ArrowRight"] || keys["KeyD"]) player.x += 5;
            if ((keys["Space"] || keys["ArrowUp"] || keys["KeyW"]) && !player.isJumping) { 
                player.dy = -12; 
                player.isJumping = true; 
            }
            
            // 重力計算
            player.dy += 0.5; 
            player.y += player.dy;
            
            // 接地判定
            if (player.y > canvas.height - 30) { 
                player.y = canvas.height - 30; 
                player.dy = 0; 
                player.isJumping = false; 
            }

            // 自分の位置を全プレイヤーへ送信
            Object.values(connections).forEach(c => c.open && c.send({ x: player.x, y: player.y }));
            
            // 描画処理
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#222"; 
            ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
            
            drawCharacter(player.x, player.y, player.color, player.name, player.msg, true);
            Object.values(others).forEach(p => drawCharacter(p.x, p.y, p.color, p.name, p.msg, false));
            
            requestAnimationFrame(update);
        }

        /**
         * キャラクターの描画補助関数
         */
        function drawCharacter(x, y, col, name, msg, isMe) {
            ctx.fillStyle = col; 
            ctx.fillRect(x, y, 30, 30);
            
            if (isMe) { 
                ctx.strokeStyle = "#00bcd4"; 
                ctx.lineWidth = 2; 
                ctx.strokeRect(x, y, 30, 30); 
            }
            
            ctx.fillStyle = "white"; 
            ctx.font = "bold 10px Arial"; 
            ctx.textAlign = "center";
            ctx.fillText(name, x + 15, y - 15);
            
            if (msg) { 
                ctx.fillStyle = "rgba(0,0,0,0.7)"; 
                ctx.fillRect(x - 20, y - 45, 70, 20);
                ctx.fillStyle = "#0f0"; 
                ctx.fillText(msg, x + 15, y - 31); 
            }
        }

        function updatePeerCount() { 
            document.getElementById('peer-count').innerText = Object.keys(connections).length; 
        }

        // アニメーションの開始
        update();
    </script>
</body>
</html>
